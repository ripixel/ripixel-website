<!DOCTYPE html>
<html lang="en">
{{> head}}

<body class="page-changelog" data-page="changelog">
  <div class="paper-wash" aria-hidden="true"></div>
  <div class="paper-dot" aria-hidden="true"></div>

  {{> masthead}}

  <div class="zine-content page-simple">
    <h1>CHANGELOG.</h1>
    <div style="font-family:var(--f-mono);font-size:13px;color:var(--ink);opacity:.7;margin-bottom:20px">
      what's changed on this site — {{latestVersion}}
    </div>
    {{{changelogHtml}}}
  </div>

  {{> footer}}

  <div class="paper-grain" aria-hidden="true"></div>
</body>
</html>
